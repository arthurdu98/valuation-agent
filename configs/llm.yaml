# LLM Multi-Model Configuration
default_model: "deepseek-flash"

models:
  deepseek-flash:
    provider: "openai_compatible"
    model_name: "deepseek-v4-flash"
    base_url: "https://api.deepseek.com/v1"
    api_key_env: "DEEPSEEK_API_KEY"
    temperature: 0.7
    max_tokens: 4096
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0

# Role-based model routing — all roles use deepseek-flash
role_routing:
  master_narrate: "deepseek-flash"
  debate_bull: "deepseek-flash"
  debate_bear: "deepseek-flash"
  debate_judge: "deepseek-flash"
  risk_falsify: "deepseek-flash"
  final_valuation: "deepseek-flash"
  news_classify: "deepseek-flash"
  reflection: "deepseek-flash"
  default: "deepseek-flash"

# Fallback chain
fallback_chain:
  - "deepseek-flash"
